<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Worker Dashboard - Timer Edition</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-dark: #0f0f12;
      --card-bg: #17171c;
      --border: #2a2a33;
      --accent: linear-gradient(90deg, #ff3b30, #ff7a00);
      --text-main: #f3f3f3;
      --text-dim: #aaa;
    }
    body { margin: 0; font-family: sans-serif; background: var(--bg-dark); color: var(--text-main); padding: 15px; }
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 15px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .title { font-size: 11px; color: var(--text-dim); text-transform: uppercase; }
    .value { font-size: 20px; font-weight: bold; margin-top: 5px; }
    .btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
    th { text-align: left; color: var(--text-dim); padding: 8px; border-bottom: 1px solid var(--border); }
    td { padding: 10px 8px; border-bottom: 1px solid var(--border); }
    .badge { background: #2a2a33; padding: 3px 6px; border-radius: 4px; font-size: 10px; border: none; color: white; cursor: pointer; }
    
    /* Animation du Timer */
    #timer-display { color: #ff3b30; font-weight: bold; font-family: monospace; }
  </style>
</head>
<body>

  <h2 style="margin-bottom:5px;">Profil : Herys</h2>
  <p style="color:var(--text-dim); font-size:12px; margin-bottom:20px;">Statut : Newcomer</p>

  <div class="grid">
    <div class="card">
      <div class="title">Trust Score</div>
      <div class="value">30%</div>
    </div>
    <div class="card">
      <div class="title">Timer de validation</div>
      <div class="value" id="timer-display">00:00</div>
    </div>
  </div>

  <div class="card">
    <button class="btn" onclick="syncRealData()">Synchroniser les tâches</button>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>Réseau</th>
            <th>Handle</th>
            <th>Gain</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="taskBody">
          <tr><td colspan="4" style="text-align:center; padding:20px; color:var(--text-dim);">Cliquez sur synchroniser</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    function syncRealData() {
        const table = document.getElementById('taskBody');
        // Exemple de tâche TikTok réelle
        const tiktokUrl = "https://www.tiktok.com/@tiktok"; 
        
        table.innerHTML = `
            <tr>
                <td><span class="badge">TIKTOK</span></td>
                <td>@tiktok</td>
                <td style="color:#4cd964;">$0.004</td>
                <td><button class="badge" style="background:#ff7a00" onclick="startTask('${tiktokUrl}')">GO</button></td>
            </tr>
        `;
    }

    function startTask(url) {
        // 1. Ouvrir le lien TikTok
        window.open(url, '_blank');

        // 2. Lancer le compte à rebours (30 secondes)
        let timeLeft = 30;
        const display = document.getElementById('timer-display');
        
        const countdown = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(countdown);
                display.innerText = "PRÊT !";
                display.style.color = "#4cd964"; // Devient vert quand c'est fini
                alert("Vous pouvez maintenant valider la tâche sur le site !");
            } else {
                display.innerText = "00:" + (timeLeft < 10 ? "0" : "") + timeLeft;
                timeLeft--;
            }
        }, 1000);
    }
  </script>
</body>
</html>
