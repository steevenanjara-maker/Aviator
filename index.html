<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR.SOCIAL - Projet Etude</title>
    <style>
        body { font-family: sans-serif; background-color: #0f0f0f; color: #e0e0e0; padding: 20px; }
        .container { max-width: 450px; margin: auto; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        h2 { text-align: center; color: #fff; margin-bottom: 20px; border-bottom: 2px solid #ff4500; padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #252525; border: 1px solid #444; color: #00ff00; border-radius: 6px; box-sizing: border-box; }
        .btn { background: #ff4500; color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        #status-msg { text-align: center; margin-top: 10px; font-size: 0.9em; }
        .task-item { background: #252525; padding: 15px; margin-top: 10px; border-radius: 8px; display: flex; justify-content: space-between; border-left: 5px solid #ff4500; }
        .reward { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>PR.SOCIAL DASHBOARD</h2>
    <div class="card">
        <label>Ma Clé API :</label>
        <input type="text" id="apiKey" value="prs_1138fa3554ad7d9eeb00f89a2df26d32">
        <button class="btn" onclick="fetchTasks()">ACTUALISER LES MISSIONS</button>
        <div id="status-msg">Prêt.</div>
    </div>

    <div class="card">
        <h3>Missions Disponibles</h3>
        <ul id="task-list" style="list-style:none; padding:0;"></ul>
    </div>
</div>

<script>
    async function fetchTasks() {
        const key = document.getElementById('apiKey').value;
        const taskList = document.getElementById('task-list');
        const statusMsg = document.getElementById('status-msg');
        
        taskList.innerHTML = "";
        statusMsg.innerHTML = "Connexion sécurisée en cours...";
        statusMsg.style.color = "#ff4500";

        try {
            // Utilisation d'un proxy différent pour éviter les blocages sur mobile
            const target = "https://api.pr.social/v1/tasks";
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;

            const response = await fetch(proxyUrl);
            const data = await response.json();
            
            // On vérifie si AllOrigins a bien récupéré les données
            if (data.contents) {
                const tasks = JSON.parse(data.contents);
                statusMsg.innerHTML = "Mise à jour réussie !";
                statusMsg.style.color = "#00ff00";

                if (tasks.length === 0) {
                    statusMsg.innerHTML = "Aucune mission disponible.";
                } else {
                    tasks.forEach(task => {
                        const li = document.createElement('li');
                        li.className = "task-item";
                        li.innerHTML = `<span>${task.name || 'Mission'}</span><span class="reward">$${task.reward || '0.05'}</span>`;
                        taskList.appendChild(li);
                    });
                }
            } else {
                statusMsg.innerHTML = "Erreur : Impossible de lire les données.";
            }
        } catch (error) {
            statusMsg.innerHTML = "Erreur réseau. Réessayez dans Chrome.";
            console.error(error);
        }
    }
</script>
</body>
</html>
