<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Dashboard PR.SOCIAL</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; padding: 20px; }
        .card { background: #1e1e1e; border-radius: 10px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        .btn { background: #ff4500; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn:active { background: #e03e00; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #00ff00; border-radius: 5px; box-sizing: border-box; font-family: monospace; }
        #task-list { list-style: none; padding: 0; margin-top: 15px; }
        .task-item { background: #2a2a2a; padding: 15px; margin-top: 8px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #ff4500; }
        .reward { color: #00ff00; font-weight: bold; }
        .loader { color: #888; font-style: italic; text-align: center; margin: 10px; }
    </style>
</head>
<body>

    <h2>Projet "Etude" - PR.SOCIAL</h2>

    <div class="card">
        <h3>Configuration API</h3>
        <label>Ma Clé de Travail :</label>
        <!-- Ta clé récupérée sur Screenshot_20260501_132436_Firefox.jpg -->
        <input type="text" id="apiKey" value="prs_1138fa3554ad7d9eeb00f89a2df26d32" placeholder="Entrez votre clé API ici">
        <button class="btn" onclick="fetchTasks()">ACTUALISER LES MISSIONS</button>
    </div>

    <div class="card">
        <h3>Missions Disponibles</h3>
        <div id="status-msg" class="loader">Appuyez sur le bouton pour charger...</div>
        <ul id="task-list"></ul>
    </div>

    <script>
        async function fetchTasks() {
            const key = document.getElementById('apiKey').value;
            const taskList = document.getElementById('task-list');
            const statusMsg = document.getElementById('status-msg');
            
            // Réinitialisation
            taskList.innerHTML = "";
            statusMsg.innerHTML = "Connexion au serveur PR.SOCIAL en cours...";
            statusMsg.style.color = "#888";

            try {
                // Utilisation d'un proxy pour éviter l'erreur de connexion vue sur Screenshot_20260501_133236_Acode.jpg
                const proxyUrl = "https://corsproxy.io/?";
                const targetUrl = "https://api.pr.social/v1/tasks"; // Vérifie si l'URL est /tasks ou /worker/tasks

                const response = await fetch(proxyUrl + targetUrl, {
                    method: 'GET',
                    headers: { 
                        'Authorization': `Bearer ${key}`,
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    const tasks = await response.json();
                    statusMsg.innerHTML = ""; // Efface le message de chargement
                    
                    if (tasks.length === 0) {
                        statusMsg.innerHTML = "Aucune tâche disponible pour le moment.";
                    } else {
                        tasks.forEach(task => {
                            const li = document.createElement('li');
                            li.className = "task-item";
                            li.innerHTML = `
                                <span>${task.name || 'Mission Sociale'}</span>
                                <span class="reward">+ $${task.reward || '0.00'}</span>
                            `;
                            taskList.appendChild(li);
                        });
                    }
                } else {
                    statusMsg.innerHTML = "Erreur " + response.status + " : Clé API invalide ou accès refusé.";
                    statusMsg.style.color = "red";
                }
            } catch (error) {
                statusMsg.innerHTML = "Erreur réseau : Vérifiez votre connexion internet.";
                statusMsg.style.color = "red";
                console.error(error);
            }
        }
    </script>
</body>
</html>
